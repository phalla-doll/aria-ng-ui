<div class="min-h-screen bg-background">
  <header class="border-b border-border">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-4">
      <a routerLink="/" uiButton variant="ghost" size="sm">
        &larr; Home
      </a>
      <h1 class="text-lg font-semibold text-foreground">Components</h1>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10 space-y-16">
    <section>
      <h2 class="text-2xl font-bold tracking-tight text-foreground">Button</h2>
      <p class="text-muted-foreground mt-1">Displays a button or a component that looks like a button.</p>

      <div class="mt-8 space-y-10">
        <div>
          <h3 class="text-sm font-medium text-muted-foreground mb-4">Variants</h3>
          <div class="flex flex-wrap items-center gap-3">
            <button uiButton>Default</button>
            <button uiButton variant="secondary">Secondary</button>
            <button uiButton variant="destructive">Destructive</button>
            <button uiButton variant="outline">Outline</button>
            <button uiButton variant="ghost">Ghost</button>
            <button uiButton variant="link">Link</button>
          </div>
        </div>

        <div>
          <h3 class="text-sm font-medium text-muted-foreground mb-4">Sizes</h3>
          <div class="flex flex-wrap items-center gap-3">
            <button uiButton size="sm">Small</button>
            <button uiButton>Default</button>
            <button uiButton size="lg">Large</button>
            <button uiButton size="icon">&#9776;</button>
          </div>
        </div>

        <div>
          <h3 class="text-sm font-medium text-muted-foreground mb-4">Disabled</h3>
          <div class="flex flex-wrap items-center gap-3">
            <button uiButton disabled>Default</button>
            <button uiButton variant="secondary" disabled>Secondary</button>
            <button uiButton variant="destructive" disabled>Destructive</button>
            <button uiButton variant="outline" disabled>Outline</button>
          </div>
        </div>

        <div>
          <h3 class="text-sm font-medium text-muted-foreground mb-4">As Link</h3>
          <div class="flex flex-wrap items-center gap-3">
            <a href="#" uiButton>Link Button</a>
            <a href="#" uiButton variant="outline">Outline Link</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
